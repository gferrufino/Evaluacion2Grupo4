name: Pipeline CI/CD DevOps - Python FastAPI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-tests:
    name: Pruebas Unitarias (IE2)
    runs-on: ubuntu-latest
    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar PyTest
        run: |
          pytest app/test_main.py -v

  security-scan:
    name: Anßlisis de Seguridad Snyk (IE3)
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v4

      - name: Escanear Dependencias con Snyk
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  deploy-simulated:
    name: Construcciˇn y Despliegue Simulado (IE4)
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v4

      - name: Construir Imagen Docker con Git SHA
        run: |
          IMAGE_TAG="mi-microservicio:${{ github.sha }}"
          echo "Etiquetando imagen para trazabilidad: $IMAGE_TAG"
          docker build -t $IMAGE_TAG .

      - name: Desplegar en Entorno Simulado
        run: |
          docker compose up -d
          echo "Ecosistema desplegado con exito."
          docker compose ps
